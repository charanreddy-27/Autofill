<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Autofill Vault — Test Form</title>
  <style>
    body { font-family: -apple-system, "Segoe UI", Roboto, sans-serif; background: #f4f5fb; color: #1a1c2e; margin: 0; padding: 40px 16px; }
    .card { max-width: 620px; margin: 0 auto; background: #fff; border: 1px solid #e7e8f0; border-radius: 16px; padding: 28px; box-shadow: 0 8px 24px rgba(16,24,40,.06); }
    h1 { font-size: 20px; margin: 0 0 4px; }
    p.sub { color: #6b7088; margin: 0 0 22px; }
    label { display: block; font-size: 12px; font-weight: 700; color: #6b7088; margin: 14px 0 6px; }
    input, select { width: 100%; padding: 11px 13px; border: 1px solid #e7e8f0; border-radius: 9px; font-size: 14px; box-sizing: border-box; }
    .row { display: flex; gap: 14px; }
    .row > div { flex: 1; }
    button { margin-top: 22px; background: linear-gradient(135deg,#6366f1,#8b5cf6); color: #fff; border: none; padding: 12px 20px; border-radius: 10px; font-weight: 700; cursor: pointer; }
  </style>
</head>
<body>
  <form class="card" onsubmit="event.preventDefault(); alert('Submitted (demo)');">
    <h1>Job Application — Test Form</h1>
    <p class="sub">Click the extension → <b>⚡ Fill this page</b> (or press Alt+Shift+F).</p>

    <div class="row">
      <div><label for="fn">First name</label><input id="fn" name="first_name" autocomplete="given-name" /></div>
      <div><label for="ln">Last name</label><input id="ln" name="last_name" autocomplete="family-name" /></div>
    </div>

    <label for="em">Email address</label>
    <input id="em" name="email" type="email" autocomplete="email" />

    <label for="ph">Phone number</label>
    <input id="ph" name="phone" type="tel" autocomplete="tel" />

    <label for="addr">Street address</label>
    <input id="addr" name="address" autocomplete="address-line1" />

    <div class="row">
      <div><label for="city">City</label><input id="city" name="city" autocomplete="address-level2" /></div>
      <div><label for="state">State</label><input id="state" name="state" autocomplete="address-level1" /></div>
      <div><label for="zip">ZIP code</label><input id="zip" name="postal_code" autocomplete="postal-code" /></div>
    </div>

    <label for="country">Country</label>
    <input id="country" name="country" autocomplete="country-name" />

    <div class="row">
      <div><label for="company">Current company</label><input id="company" name="company" autocomplete="organization" /></div>
      <div><label for="title">Job title</label><input id="title" name="job_title" /></div>
    </div>

    <label for="linkedin">LinkedIn profile</label>
    <input id="linkedin" name="linkedin_url" />

    <label for="portfolio">Portfolio / Website</label>
    <input id="portfolio" name="website" type="url" autocomplete="url" />

    <button type="submit">Submit application</button>
  </form>
</body>
</html>
